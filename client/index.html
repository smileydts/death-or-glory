<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta http-equiv="X-UA-Compatible" content="IE=edge">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Death or Glory</title>
      <style>
         body {
         overflow: hidden;  
         background-image:  url('images/Layer1.jpg');
         background-repeat: no-repeat;
         background-size: cover;
         margin: 0;
         padding: 0;
         border: 0;
         }
         .GameIntro {
         display: flex;
         flex-direction: column;
         align-items: center;
         justify-content: flex-start;
         height: 100vh;
         padding-top: 20vh;
         }
         h1 {
         text-align: center;
         position: relative;
         font-size: 4em; /* Change this value to adjust the font size */
         margin-bottom: 4vh; /* Add some space below the h1 */
         margin-top: 15vh;
         }
         #name {
         margin-top: 3vh;}
         #Submit {
         margin-top: 3vh;
         }
         label {
         font-size: 2em; /* Adjust this value to change the font size */
         margin-top: 3vh;
         }

         #MainGame {
            position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: none; /* Hide the main game by default */
    overflow: hidden;  
         background-image:  url('images/Layer1.jpg');
         background-repeat: no-repeat;
         background-size: cover;
         margin: 0;
         padding: 0;
         border: 0;
         }


      </style>
   </head>
   <body>
      <div class="GameIntro">
         <h1 id="Heading">Death or Glory</h1>
         <label for="name">Enter Your Player Name:</label>
         <input type="text" id="name" name="name" autocomplete="off" style="width: 200px; height: 30px; padding: 5px;">
         <button id="Submit">Submit</button>
         <div id="message"></div>
         <button id="joinGameButton" style="display: none;">Join Game</button>
      </div>
      <div id="MainGame"></div>
           <script>
         document.getElementById('Submit').onclick = function() {
         const name = document.getElementById('name').value;
         localStorage.setItem('name', name);
         document.getElementById('message').innerText = "Welcome, " + name + "!";
    
         
           // Show the "Join Game" button
         document.getElementById('joinGameButton').style.display = 'block';
         
         document.getElementById('name').style.display = 'none';
         document.querySelector('label[for="name"]').style.display = 'none';
         document.getElementById('Submit').style.display = 'none';
         
         };
         
         document.getElementById('joinGameButton').onclick = function() {
         // Hide the .GameIntro div
         document.querySelector('.GameIntro').style.display = 'none';
         
        // Fetch the mainGame.html file and load its contents into #MainGame
    fetch('MainGame.html')
        .then(response => response.text())
        .then(html => {
            document.getElementById('MainGame').innerHTML = html;
            document.getElementById('MainGame').style.display = 'block'; // Show the new page
        });

    };
      </script>

         
      
   </body>
</html>
